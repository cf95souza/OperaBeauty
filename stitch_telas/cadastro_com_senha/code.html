<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .soft-shadow {
            shadow-[0px_4px_20px_rgba(0,0,0,0.04)];
        }
        body {
            background-color: #f9f9f9;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start overflow-x-hidden">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-surface dark:bg-surface flex items-center justify-between px-container-margin py-md w-full z-40">
<div class="flex items-center gap-md">
<button class="active:scale-95 duration-150 hover:opacity-80 transition-opacity text-primary dark:text-primary-fixed-dim">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<span class="font-headline-md text-headline-md text-primary dark:text-primary-fixed-dim tracking-tight">Serene Beauty</span>
</div>
<div class="w-6"></div> <!-- Spacer for symmetry -->
</header>
<main class="w-full max-w-md px-container-margin flex-grow flex flex-col">
<!-- Hero Decorative Element (Bento-style layout for mobile registration) -->
<section class="mt-md mb-xl">
<div class="grid grid-cols-2 gap-4 h-48">
<div class="bg-primary-container rounded-xl overflow-hidden relative group transition-transform duration-500 hover:scale-[1.02]">
<img alt="Beauty Atmosphere" class="w-full h-full object-cover opacity-80" data-alt="A high-end, minimalist beauty salon interior with soft beige walls and elegant curved furniture. The lighting is bright and ethereal, casting soft shadows that enhance the tranquil atmosphere. A touch of soft rose accents and pristine white surfaces maintain a luxurious, serene professionalism." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBY2D0vDZtjzyiwfZHAfSdcsfMe2eBgerm3GkEy1h9CfY63fh8WGVTjZGNdRzcni39FE13M0kmtTmgPqayJxgNT3XHeGPgetAL38r4C8IK6Nn2ZCm8wezHp_5m4MgbSHZwXUlyP8maVtAYWvPKPYqqVKtibIHPbxpqI_S56CsryrV0_6TqIS3AA-9I1kgLP7h-GhOvTETGtP82vQ-f9gGPmpTSUMbefEituG_cNFoyf0YLT1kB3X6XqNOEdFjSdbF8wF25PNvaUYC1b"/>
<div class="absolute inset-0 bg-primary/20 mix-blend-multiply"></div>
</div>
<div class="flex flex-col gap-4">
<div class="h-1/2 bg-surface-container-highest rounded-xl flex items-center justify-center p-4">
<span class="material-symbols-outlined text-primary scale-150" data-icon="auto_awesome">auto_awesome</span>
</div>
<div class="h-1/2 bg-secondary-container rounded-xl flex items-center justify-center p-4">
<span class="material-symbols-outlined text-on-secondary-container scale-150" data-icon="spa">spa</span>
</div>
</div>
</div>
</section>
<!-- Welcome Text -->
<section class="mb-lg">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">Parece que você é novo por aqui!</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Vamos fazer seu cadastro para você aproveitar a melhor experiência de beleza.</p>
</section>
<!-- Form Section -->
<section class="bg-surface-container-lowest rounded-xl p-lg shadow-[0px_4px_20px_rgba(0,0,0,0.04)] mb-xl">
<form class="space-y-lg" id="registrationForm">
<!-- Nome Completo -->
<div class="relative">
<label class="font-label-md text-label-md text-on-surface-variant block mb-2" for="name">Nome completo</label>
<input class="w-full border-0 border-b border-outline-variant bg-transparent px-0 py-2 focus:ring-0 focus:border-primary transition-colors font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="name" name="name" placeholder="Como quer ser chamado(a)?" type="text"/>
</div>
<!-- Telefone (Pre-filled) -->
<div class="relative">
<label class="font-label-md text-label-md text-on-surface-variant block mb-2" for="phone">Telefone</label>
<div class="flex items-center border-b border-outline-variant">
<span class="material-symbols-outlined text-outline text-md mr-2" data-icon="phone_android">phone_android</span>
<input class="w-full border-0 bg-transparent px-0 py-2 focus:ring-0 font-body-md text-body-md text-secondary cursor-not-allowed" id="phone" name="phone" readonly="" type="tel" value="(11) 98765-4321"/>
<span class="material-symbols-outlined text-primary-container text-md" data-icon="verified" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
</div>
<!-- Data de Aniversário -->
<div class="relative">
<label class="font-label-md text-label-md text-on-surface-variant block mb-2" for="birthday">Data de Aniversário</label>
<input class="w-full border-0 border-b border-outline-variant bg-transparent px-0 py-2 focus:ring-0 focus:border-primary transition-colors font-body-md text-body-md text-on-surface" id="birthday" name="birthday" type="date"/>
</div><div class="relative">
<label class="font-label-md text-label-md text-on-surface-variant block mb-2" for="password">Senha</label>
<div class="flex items-center border-b border-outline-variant">
<input class="w-full border-0 bg-transparent px-0 py-2 focus:ring-0 focus:border-primary transition-colors font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="password" name="password" placeholder="Crie uma senha segura" type="password"/>
<button class="text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-md" data-icon="visibility">visibility</span>
</button>
</div>
</div>
</form>
</section>
<!-- Final Action -->
<div class="mt-auto mb-xl">
<button class="w-full py-4 bg-primary text-on-primary font-label-md text-label-md rounded-full shadow-lg active:scale-95 transition-transform duration-150 flex items-center justify-center gap-2" id="submitBtn">
<span>Criar Conta</span>
<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
</button>
<p class="mt-4 text-center font-label-sm text-label-sm text-on-surface-variant px-md">
                Ao finalizar, você concorda com nossos termos de privacidade e serviço de luxo.
            </p>
</div>
</main>
<!-- Navigation Shell is suppressed as per the "Linear/Transactional" rule in the mandate -->
<script>
        // Micro-interaction for the submit button
        document.getElementById('submitBtn').addEventListener('click', function(e) {
            e.preventDefault();
            const btn = this;
            const icon = btn.querySelector('.material-symbols-outlined');
            const text = btn.querySelector('span:not(.material-symbols-outlined)');
            
            // Visual feedback
            btn.classList.add('bg-on-primary-container');
            text.innerText = 'Processando...';
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined" data-icon="done_all">done_all</span><span>Bem-vindo(a)!</span>';
                btn.classList.replace('bg-on-primary-container', 'bg-tertiary');
            }, 1500);
        });

        // Simple floating animation for decorative elements
        const decorators = document.querySelectorAll('.material-symbols-outlined.scale-150');
        decorators.forEach((el, index) => {
            el.animate([
                { transform: 'translateY(0px) scale(1.5)' },
                { transform: 'translateY(-10px) scale(1.5)' },
                { transform: 'translateY(0px) scale(1.5)' }
            ], {
                duration: 3000 + (index * 500),
                iterations: Infinity,
                easing: 'ease-in-out'
            });
        });
    </script>
</body></html>
