<body class="bg-surface font-body-md text-on-surface selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col">

<button aria-label="Voltar" class="hover:opacity-80 transition-opacity active:scale-95 duration-150 text-primary">

</button>
<h1 class="font-headline-md text-headline-md-mobile text-primary tracking-tight">Serene Beauty</h1>

</header>
<main class="flex-grow flex flex-col items-center px-container-margin pt-xl pb-lg">
<!-- Hero Decorative Section -->
<div class="relative w-full max-w-md aspect-[4/3] rounded-xl overflow-hidden mb-xl shadow-lg">
<img alt="Spa Interior" class="w-full h-full object-cover" data-alt="A serene and luxurious spa treatment room filled with soft, warm sunlight. In the background, there are minimal wooden shelves with folded white towels and delicate ceramic jars. The atmosphere is ethereal and tranquil, utilizing a high-key light mode aesthetic with soft rose and ivory tones. The composition is clean and minimalist, reflecting a professional high-end beauty sanctuary." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAX9lBuc4OUxQunjttUlB9g9uJlLw-UiNGP7l30r2RuUjBdqmIwQ_B8lv1-O_lQ184F3oBJvehMv-jao-ePyTZjj7eqt9IBY3LdJdvRbwF_muMRFnF_KGptD8x62jKcnQCP3gjRt6gGUc-hrcHZNG7gZibsTqz2F1EEBcrcOoyyvScLNX3-jZfhWgUgv8-i2GrAdIX_qMtPQHDxarxDM8SwFrR5qQe7TEGfIA5v7ImpmGlT1AYAOOmUFjVk3qqmFSpLDYMqRXqhyF5D"/>
<div class="absolute inset-0 bg-login-gradient"></div>
</div>
<!-- Content Canvas -->
<div class="w-full max-w-md">
<div class="text-left mb-lg">
<p class="font-label-md text-label-md text-secondary mb-xs">+55 (11) 99999-0000</p>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-sm">Olá! Digite sua senha para continuar</h2>
</div>
<form class="space-y-lg">
<div class="relative">
<label class="block font-label-sm text-label-sm text-outline mb-xs" for="password">Senha</label>
<div class="relative">
<input class="w-full bg-transparent border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-colors py-md font-body-lg text-body-lg placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-0 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" id="togglePassword" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="flex flex-col gap-md pt-md">
<button class="w-full py-lg bg-primary text-on-primary font-label-md text-label-md rounded-xl shadow-lg hover:opacity-90 active:scale-[0.98] transition-all duration-200" type="submit">
                        Entrar
                    </button>
<a class="text-center font-label-md text-label-md text-primary hover:underline decoration-2 underline-offset-4 transition-all" href="#">
                        Esqueci minha senha
                    </a>
</div>
</form>
</div>
<!-- Soft Decorative Element -->
<div class="mt-auto pt-xl opacity-20">
<span class="material-symbols-outlined text-[64px] text-primary" data-icon="spa">spa</span>
</div>
</main>
<!-- Bottom Navigation Shell suppressed per "The UX Goal" for Transactional screens -->
<script>
        // Password Visibility Toggle Interaction
        const toggleBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        let isVisible = false;

        toggleBtn.addEventListener('click', () => {
            isVisible = !isVisible;
            passwordInput.type = isVisible ? 'text' : 'password';
            toggleBtn.querySelector('span').innerText = isVisible ? 'visibility_off' : 'visibility';
        });

        // Micro-interaction for the "Entrar" button
        const loginForm = document.querySelector('form');
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = loginForm.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>';
            btn.disabled = true;
            
            // Simulating loading state
            setTimeout(() => {
                btn.innerHTML = 'Sucesso!';
                btn.classList.replace('bg-primary', 'bg-green-600');
            }, 1500);
        });
    </script>
