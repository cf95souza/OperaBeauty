<body class="flex flex-col min-h-screen font-body-md text-on-surface">
<main class="flex-grow flex flex-col items-center px-container-margin pt-xl pb-lg overflow-hidden relative">

<div class="w-full max-w-md flex flex-col items-center text-center fade-in">
<header class="mb-xl">
<div class="flex flex-col items-center gap-base">

<div class="w-full mb-lg">
<img class="w-full aspect-[4/3] object-cover rounded-xl shadow-lg mb-lg" data-alt="A tranquil high-end beauty spa environment with soft rose-tinted lighting and minimalist decor. In the background, a blurred serene silhouette of a woman enjoying a wellness treatment creates a mood of immediate relaxation and exclusivity. The visual style is premium and professional, utilizing a palette of soft pinks, warm greys, and clean whites to evoke confidence and tranquility." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD0lmx1ogRGahvge5467Oei_h2Ymvaj_nE7LBksQ8zKBZy0rlQg_rfa6SOC8RbIhbh5bqY7VRaB3PlKXh3oHdk-vLRIdIBC9tTYSN0mt2FDGD9tLCTGxRj8RK4hcMzAwsv19gSq879TjByzaP7jecxaIvxjrO_m3K3nQ9ZmgHq7j2DxuhOid1LGOskqBU3DEJJ_WT0s3p_SwEmhdALdH0NusT4EVHaezcWZoqtHnuAZ3EoJB0sFrT5nvlV4NCx3OK6JCGnKAK3R4Z42"/>
</div>
<section class="w-full space-y-md">
<div class="space-y-xs">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Bem-vindo ao Serene Beauty</h2>
<p class="text-on-surface-variant font-body-md">Sua jornada de autocuidado e luxo começa aqui.</p>
</div>
<form class="space-y-lg pt-md" id="login-form">
<div class="relative group">
<label class="absolute -top-3 left-4 px-1 bg-surface text-label-sm text-outline group-focus-within:text-primary transition-colors" for="phone">
                            Digite seu telefone
                        </label>
<input class="w-full px-lg py-md bg-transparent border border-outline-variant rounded-xl text-body-md focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none" id="phone" placeholder="(00) 00000-0000" required="" type="tel"/>
</div>
<button class="w-full py-md bg-primary text-on-primary font-label-md text-label-md rounded-xl shadow-md active:scale-95 transition-transform duration-150 flex items-center justify-center gap-sm" type="submit">
                        Próximo
                        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<div class="pt-lg flex items-center justify-center gap-xs">
<div class="h-[1px] w-8 bg-outline-variant"></div>
<p class="text-label-sm text-outline-variant uppercase tracking-widest">Minimalist Luxury</p>
<div class="h-[1px] w-8 bg-outline-variant"></div>
</div>
</section>
</div>
</main>
<footer class="p-lg text-center mt-auto">
<p class="text-label-sm text-on-surface-variant/60">
            © 2024 Serene Beauty. Todos os direitos reservados.
        </p>
</footer>
<script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const phone = document.getElementById('phone').value;
            if (phone.length > 8) {
                const btn = e.target.querySelector('button');
                btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
                setTimeout(() => {
                    alert('Processando login para: ' + phone);
                    btn.innerHTML = 'Próximo <span class="material-symbols-outlined text-[18px]">arrow_forward</span>';
                }, 1000);
            }
        });

        const phoneInput = document.getElementById('phone');
        phoneInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            
            if (value.length > 10) {
                value = `(${value.slice(0, 2)}) ${value.slice(2, 7)}-${value.slice(7)}`;
            } else if (value.length > 6) {
                value = `(${value.slice(0, 2)}) ${value.slice(2, 6)}-${value.slice(6)}`;
            } else if (value.length > 2) {
                value = `(${value.slice(0, 2)}) ${value.slice(2)}`;
            } else if (value.length > 0) {
                value = `(${value}`;
            }
            e.target.value = value;
        });
    </script>
