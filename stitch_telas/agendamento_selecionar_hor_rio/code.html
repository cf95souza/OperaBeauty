<script>
        function selectTime(element) {
            // Remove active classes from all slots
            document.querySelectorAll('.time-slot').forEach(slot => {
                slot.classList.remove('bg-primary-container', 'text-on-primary-container', 'border-primary', 'font-bold', 'scale-95');
                slot.classList.add('bg-surface-container-lowest', 'text-on-surface', 'border-transparent');
                
                // Remove check icon if exists
                const existingCheck = slot.querySelector('.material-symbols-outlined');
                if (existingCheck && existingCheck.innerText === 'check') {
                    existingCheck.remove();
                }
            });

            // Add active classes to selected slot
            element.classList.remove('bg-surface-container-lowest', 'text-on-surface', 'border-transparent');
            element.classList.add('bg-primary-container', 'text-on-primary-container', 'border-primary', 'font-bold', 'scale-95', 'relative');
            
            // Add check icon
            const checkIcon = document.createElement('span');
            checkIcon.className = 'material-symbols-outlined text-[16px] absolute -top-1 -right-1 bg-primary text-on-primary rounded-full p-[2px]';
            checkIcon.setAttribute('data-icon', 'check');
            checkIcon.style.fontVariationSettings = "'FILL' 1";
            checkIcon.innerText = 'check';
            element.appendChild(checkIcon);
            
            // Subtle haptic feedback feel
            if (window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
        }

        // Handle sticky header scroll effect
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 10) {
                header.classList.add('glass-card');
                header.classList.remove('bg-surface');
            } else {
                header.classList.remove('glass-card');
                header.classList.add('bg-surface');
            }
        });
    </script>
