<body class="bg-surface text-on-surface antialiased min-h-screen flex items-center justify-center p-gutter md:p-0">
<div class="w-full max-w-5xl flex flex-col md:flex-row bg-surface-container-lowest rounded-xl md:rounded-3xl shadow-[0px_4px_20px_rgba(0,0,0,0.04)] overflow-hidden min-h-[600px]">
<!-- Image Section (Desktop Only) -->
<div class="hidden md:block md:w-1/2 relative bg-surface-container">
<img alt="Spa interior" class="absolute inset-0 w-full h-full object-cover" data-alt="A beautifully composed, high-end photography shot of a luxury minimalist beauty salon interior. The space is bathed in soft, diffused natural light pouring in from unseen tall windows, creating a bright, airy light-mode aesthetic. Delicate architectural shadows fall across smooth, creamy white walls and light oak wooden accents. Subtle hints of soft rose and deep charcoal can be seen in the elegant, uncluttered styling accessories resting on a sleek marble counter. The mood is exceptionally serene, professional, and tranquil." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDUPnRMkAaP3fjFFG7IFw7QHsrroWNFmOBHMWnmyvvawxSViimXi_cId57WtKtxA1ep3z4Oy93rQEh0_zsXt6FMJZcfD6Qy6NZj2NAYzkt62X2YFxdtBBq_ZFMgKQrgxb9SHAeml_fAHc0qBmx0MTSNwJUiBY8r8XZqDuSDh-MpbJjZ8HI1jCpq2QuBu050ww5wR4QOFhXraGlIBhv0s9s2FW2hI_29CJkbjB0qJ88ltzYBG_J-oDb8oZYU8TW8RqABnZTytdvOUjuA"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/30 to-transparent"></div>
<div class="absolute bottom-xl left-xl right-xl text-white">
<span class="font-headline-md text-headline-md block mb-sm">Radiant Salon</span>
<p class="font-body-md text-body-md opacity-90">Sua jornada de beleza começa aqui. Excelência e tranquilidade em cada detalhe.</p>
</div>
</div>
<!-- Login Form Section -->
<div class="w-full md:w-1/2 flex flex-col justify-center px-lg py-xl md:px-xl">
<div class="max-w-sm w-full mx-auto">
<!-- Mobile Brand (Hidden on Desktop) -->
<div class="md:hidden mb-xl text-center">
<span class="font-headline-md text-headline-md text-primary">Radiant Salon</span>
</div>
<div class="mb-xl">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-sm">Acesso Profissional</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Bem-vindo(a) de volta. Insira suas credenciais para acessar sua agenda.</p>
</div>
<form class="space-y-lg flex flex-col">
<!-- Email Input -->
<div class="relative group">
<label class="font-label-sm text-label-sm text-on-surface-variant block mb-base transition-colors group-focus-within:text-primary" for="email">E-mail</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-0 text-on-surface-variant group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-sm pl-[32px] font-body-md text-body-md text-on-surface placeholder:text-outline focus:ring-0 focus:border-primary transition-colors" id="email" name="email" placeholder="nome@radiantsalon.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="relative group">
<label class="font-label-sm text-label-sm text-on-surface-variant block mb-base transition-colors group-focus-within:text-primary" for="password">Senha</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-0 text-on-surface-variant group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-sm pl-[32px] pr-[32px] font-body-md text-body-md text-on-surface placeholder:text-outline focus:ring-0 focus:border-primary transition-colors" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-0 text-on-surface-variant hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Actions Row -->
<div class="flex items-center justify-between pt-sm">
<label class="flex items-center gap-sm cursor-pointer group">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary/20 transition-all cursor-pointer" type="checkbox"/>
<span class="font-label-md text-label-md text-on-surface-variant group-hover:text-on-surface transition-colors">Lembrar-me</span>
</label>
<a class="font-label-sm text-label-sm text-primary hover:text-on-primary-fixed-variant transition-colors hover:underline" href="#">Esqueci minha senha</a>
</div>
<!-- Submit Button -->
<button class="w-full mt-lg bg-primary text-on-primary py-md px-lg rounded-lg font-label-md text-label-md flex items-center justify-center gap-sm hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all shadow-sm" type="submit">
<span>Entrar</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
</div>
</div>
</div>
