<script>
        // Simple micro-interaction for input focus effects
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').classList.replace('text-secondary', 'text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').classList.replace('text-primary', 'text-secondary');
            });
        });

        // Save changes success toast simulation
        const saveBtn = document.querySelector('button.bg-primary');
        saveBtn.addEventListener('click', () => {
            saveBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span>';
            setTimeout(() => {
                saveBtn.innerHTML = 'Alterações Salvas!';
                saveBtn.classList.replace('bg-primary', 'bg-tertiary');
                setTimeout(() => {
                    saveBtn.innerHTML = 'Salvar Alterações';
                    saveBtn.classList.replace('bg-tertiary', 'bg-primary');
                }, 2000);
            }, 1000);
        });
    </script>
